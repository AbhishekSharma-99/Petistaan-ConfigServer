spring.application.name=Petistaan-ConfigServer
server.port=8888
spring.cloud.config.server.git.uri=https://github.com/AbhishekSharma-99/Petistaan-Configuration
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.default-label=main
spring.cloud.config.server.git.username=${GitHub_Username}
spring.cloud.config.server.git.password=${GitHub_Personal_Access_Token}